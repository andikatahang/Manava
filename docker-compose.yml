# Manava — 3 single-responsibility containers on a shared bridge network.
#   postgres  → PostgreSQL 16, container "database" (data volume: postgres_data)
#   api       → Express + Prisma backend, container "backend"
#   frontend  → Vite build served by nginx
#
# Dev workflow: `docker compose -f docker-compose.yml -f docker-compose.dev.yml up`
#   (mounts source + runs vite / tsx watch for HMR)
# Prod-ish:   `docker compose up --build`

services:
  postgres:
    image: postgres:16-alpine
    container_name: database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-manava}
      POSTGRES_USER: ${POSTGRES_USER:-manava}
      # Tidak ada default — wajib diset di .env agar password tidak tersimpan di repo.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD wajib diset di .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-manava} -d ${POSTGRES_DB:-manava}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - manava-net

  api:
    build:
      context: ./manava-api
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://manava:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD wajib diset di .env}@postgres:5432/manava?schema=public}
      SEED_PASSWORD: ${SEED_PASSWORD:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-7}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      # Integrasi opsional — kosong = email dilog + AI fallback heuristik.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      APP_URL: ${APP_URL:-http://localhost:5173}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - manava-net

  frontend:
    build:
      context: ./manava-app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    container_name: manava-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - api
    networks:
      - manava-net

volumes:
  postgres_data:
    name: manava_postgres_data

networks:
  manava-net:
    name: manava-net
    driver: bridge
