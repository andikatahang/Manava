# Development overrides — bind-mount source, run watchers for HMR.
# Usage: `docker compose -f docker-compose.yml -f docker-compose.dev.yml up`

services:
  api:
    build:
      target: build   # stop at the build stage so tsx + prisma CLI are present
    command: sh -c "npx prisma migrate deploy && npm run dev"
    volumes:
      - ./manava-api/src:/app/src
      - ./manava-api/prisma:/app/prisma
      - ./manava-api/tsconfig.json:/app/tsconfig.json
      - api_node_modules:/app/node_modules

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./manava-app:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  api_node_modules:
  frontend_node_modules:
