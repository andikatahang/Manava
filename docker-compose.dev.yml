# Development overrides — bind-mount source, run watchers for HMR.
# Usage: `docker compose -f docker-compose.yml -f docker-compose.dev.yml up`
#
# Enables:
# - Prisma Studio GUI (http://localhost:5555)
# - Hot reload for API & Frontend
# - Database port for external tools (localhost:5432)

services:
  postgres:
    # Expose database port for external GUI tools (TablePlus, DBeaver, pgAdmin)
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  api:
    build:
      target: build   # stop at the build stage so tsx + prisma CLI are present
    # Start Prisma Studio in background, then run dev server
    command: sh -c "npx prisma migrate deploy && (npx prisma studio --hostname 0.0.0.0 --port 5555 --browser none &) && npm run dev"
    ports:
      - "${API_PORT:-4000}:4000"
      - "5555:5555"  # Prisma Studio GUI
    volumes:
      - ./manava-api/src:/app/src
      - ./manava-api/prisma:/app/prisma
      - ./manava-api/tsconfig.json:/app/tsconfig.json
      - api_node_modules:/app/node_modules

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./manava-app:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  api_node_modules:
  frontend_node_modules:
