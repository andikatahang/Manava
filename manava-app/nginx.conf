# Nginx config for the manava-app static bundle.
# SPA fallback — all unmatched routes serve index.html so React Router works.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Static assets get long cache; index.html stays uncached to avoid stale SPA shells.
  location ~* \.(?:js|css|woff2?|ttf|otf|png|jpe?g|gif|svg|webp|avif)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
