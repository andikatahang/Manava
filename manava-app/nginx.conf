# Nginx config for the manava-app static bundle.
# SPA fallback — all unmatched routes serve index.html so React Router works.
# Security headers enforce HTTPS, prevent XSS, clickjacking, and MIME sniffing.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers — required for production
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header X-XSS-Protection "1; mode=block" always;

  # Static assets get long cache; index.html stays uncached to avoid stale SPA shells.
  location ~* \.(?:js|css|woff2?|ttf|otf|png|jpe?g|gif|svg|webp|avif)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Reverse-proxy API calls to the backend container so the app is served
  # from a single origin — avoids CORS and keeps the API off the public tunnel.
  location /api/ {
    proxy_pass http://api:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
